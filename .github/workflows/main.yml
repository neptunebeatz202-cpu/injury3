name: Build Injury

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  PLUGIN_NAME: Injury

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # macOS: VST3 + AU Universal + .pkg installer
  # ───────────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (VST3 + AU + pkg)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode 15.2
        run: sudo xcode-select --switch /Applications/Xcode_15.2.app/Contents/Developer

      - name: Install CMake 3.28
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28'

      - name: Cache JUCE
        uses: actions/cache@v4
        with:
          path: build/_deps/juce-src
          key: juce-7.0.12-${{ runner.os }}

      - name: Configure (Universal)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel $(sysctl -n hw.logicalcpu)

      - name: Locate artifacts
        run: |
          find build -name "*.vst3"      -type d | head -5
          find build -name "*.component" -type d | head -5
          find build -name "*.app"       -type d | head -5

      - name: Ad-hoc codesign
        run: |
          find build -name "*.vst3"      -type d | xargs -I{} codesign --force --deep --sign - "{}" || true
          find build -name "*.component" -type d | xargs -I{} codesign --force --deep --sign - "{}" || true
          find build -name "*.app"       -type d | xargs -I{} codesign --force --deep --sign - "{}" || true

      - name: Stage payload for pkg
        run: |
          mkdir -p pkgroot/Library/Audio/Plug-Ins/VST3
          mkdir -p pkgroot/Library/Audio/Plug-Ins/Components

          VST3=$(find build -name "*.vst3"      -type d | head -1)
          AU=$(find   build -name "*.component" -type d | head -1)

          [ -n "$VST3" ] && cp -R "$VST3" pkgroot/Library/Audio/Plug-Ins/VST3/
          [ -n "$AU"   ] && cp -R "$AU"   pkgroot/Library/Audio/Plug-Ins/Components/

          ls -la pkgroot/Library/Audio/Plug-Ins/VST3/
          ls -la pkgroot/Library/Audio/Plug-Ins/Components/

      - name: Build installer .pkg
        run: |
          mkdir -p dist
          pkgbuild \
            --root pkgroot \
            --identifier com.injury.audio.${PLUGIN_NAME} \
            --version 1.0.0 \
            --install-location / \
            "dist/${PLUGIN_NAME}-macOS-Installer.pkg"
          ls -la dist/

      - name: Also stage raw bundles for zip
        run: |
          mkdir -p raw
          VST3=$(find build -name "*.vst3"      -type d | head -1)
          AU=$(find   build -name "*.component" -type d | head -1)
          [ -n "$VST3" ] && cp -R "$VST3" raw/
          [ -n "$AU"   ] && cp -R "$AU"   raw/

      - name: Upload macOS .pkg installer
        uses: actions/upload-artifact@v4
        with:
          name: Injury-macOS-Installer-pkg
          path: dist/*.pkg
          if-no-files-found: error
          retention-days: 30

      - name: Upload macOS raw VST3 + AU
        uses: actions/upload-artifact@v4
        with:
          name: Injury-macOS-Bundles
          path: raw/
          if-no-files-found: warn
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────────
  # Windows: VST3 + Inno Setup .exe installer
  # ───────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (VST3 + exe installer)
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install CMake 3.28
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28'

      - name: Cache JUCE
        uses: actions/cache@v4
        with:
          path: build/_deps/juce-src
          key: juce-7.0.12-${{ runner.os }}

      - name: Configure (x64)
        shell: bash
        run: |
          cmake -B build -A x64 -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        shell: bash
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Locate VST3
        shell: bash
        run: |
          find build -name "*.vst3" -type d | head -5

      - name: Stage VST3 for installer
        shell: bash
        run: |
          mkdir -p stage
          VST3DIR=$(find build -name "*.vst3" -type d | head -1)
          if [ -z "$VST3DIR" ]; then
            echo "VST3 not found"; exit 1
          fi
          cp -R "$VST3DIR" stage/
          ls -la stage/

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup -y --no-progress

      - name: Build .exe installer
        shell: powershell
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" Installer\Injury.iss
          dir dist

      - name: Upload Windows .exe installer
        uses: actions/upload-artifact@v4
        with:
          name: Injury-Windows-Installer-exe
          path: dist/*.exe
          if-no-files-found: error
          retention-days: 30

      - name: Upload Windows raw VST3
        uses: actions/upload-artifact@v4
        with:
          name: Injury-Windows-VST3
          path: stage/*.vst3
          if-no-files-found: warn
          retention-days: 30
